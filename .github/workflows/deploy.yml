name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # auto-podcast-trader гЃ‹г‚‰г‚­гѓЈгѓ©гѓ‡гѓјг‚їг‚’еђЊжњџ
      - name: Sync characters.json from auto-podcast-trader
        run: |
          # specsгѓ‡г‚Јгѓ¬г‚Їгѓ€гѓЄг‚’sparse checkoutгЃ§еЏ–еѕ—
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/almlog/auto-podcast-trader.git /tmp/pipeline
          cd /tmp/pipeline
          git sparse-checkout set assets/characters/specs
          cd -

          # specгѓ•г‚Ўг‚¤гѓ«гЃ‹г‚‰characters.jsonг‚’з”џж€ђ
          node -e '
          const fs = require("fs");
          const path = require("path");
          const specsDir = "/tmp/pipeline/assets/characters/specs";
          const result = {};

          const files = fs.readdirSync(specsDir).filter(f => f.endsWith(".json") && f !== "_common.json");

          for (const file of files) {
            try {
              const spec = JSON.parse(fs.readFileSync(path.join(specsDir, file), "utf8"));
              if (!spec.nickname) continue;

              const categoryMap = {
                "гѓЎг‚¤гѓіMC": (r) => /MC/.test(r) && !/г‚Іг‚№гѓ€|жє–гѓ¬г‚®гѓҐгѓ©гѓј/.test(r),
                "г‚ўг‚·г‚№г‚їгѓігѓ€": (r) => /г‚ўг‚·г‚№г‚їгѓігѓ€/.test(r),
                "г‚Іг‚№гѓ€": (r) => /г‚Іг‚№гѓ€|жє–гѓ¬г‚®гѓҐгѓ©гѓј/.test(r),
              };

              let category = "г‚Іг‚№гѓ€";
              const role = spec.role || "";
              for (const [cat, test] of Object.entries(categoryMap)) {
                if (test(role)) { category = cat; break; }
              }

              const personality = spec.personality || {};
              const desc = personality.tone || personality.type || role;

              result[spec.nickname] = {
                name: spec.name || spec.nickname,
                role: role,
                category: category,
                description: desc,
                color: spec.theme_color || null
              };
            } catch (e) {
              console.error("Skip " + file + ": " + e.message);
            }
          }

          fs.writeFileSync("public/characters.json", JSON.stringify(result, null, 2) + "\n");
          console.log("Generated characters.json with " + Object.keys(result).length + " characters");
          '

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
