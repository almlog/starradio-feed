<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタラジ - AI自動生成ポッドキャスト</title>
  <link rel="alternate" type="application/rss+xml" title="スタラジ RSS" href="feed.xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="hero-badge">PODCAST</p>
      <h1 class="hero-title">スタラジ</h1>
      <p class="hero-subtitle">AI自動生成ポッドキャスト</p>
      <div class="hero-meta">
        <span>毎朝自動配信</span>
        <span class="hero-divider" aria-hidden="true"></span>
        <a href="feed.xml" class="hero-rss">RSS Feed</a>
      </div>
    </div>
  </header>
  <nav class="view-tabs" id="view-tabs">
    <button class="view-tab is-active" data-view="list">一覧</button>
    <button class="view-tab" data-view="calendar">カレンダー</button>
  </nav>
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn is-active" data-filter="all">ALL</button>
    <button class="filter-btn" data-filter="daily">日刊</button>
    <button class="filter-btn" data-filter="weekly">増刊号</button>
  </div>
  <div id="calendar" class="view-panel" style="display:none"></div>
  <main id="episodes" class="view-panel">
    <p class="loading">読み込み中...</p>
  </main>
  <footer>
    <p>&copy; スタラジ制作委員会</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
